<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Health Tracker - Login</title>
  </head>
  <body>
    <div class="container">
      <h1>Login</h1>
      <p>Please fill in this form to login to your account.</p>
      <hr />
      <form action="/login" method="post">
        <label for="username"><b>Enter Username</b></label>
        <input
          type="text"
          placeholder="Enter Username"
          name="username"
          required
        />
        <label for="password"><b>Password</b></label>
        <input
          type="password"
          placeholder="Enter Password"
          name="password"
          required
        />
        <button type="submit">Login Up</button>
      </form>
      <div>
        <a href="/index.html">Signup here.</a>
      </div>
    </div>
  </body>
</html>
